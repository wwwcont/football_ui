<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Football Stats" />
    <link rel="apple-touch-icon" href="/icons/app-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Football Tournament Stats</title>
  </head>
  <body class="bg-zinc-100">
    <div id="root"></div>
    <script>
      if (location.protocol === 'file:') {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div style="font-family: system-ui, sans-serif; max-width: 760px; margin: 48px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff;">
              <h1 style="margin-top:0">Run via local server</h1>
              <p>This React + Vite app will not run by opening <code>index.html</code> directly from file system.</p>
              <p><b>Use:</b> <code>npm install && npm run dev</code> and open the shown localhost URL.</p>
              <p>Or build and open preview: <code>npm run build && npm run preview</code>.</p>
            </div>
          `;
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
